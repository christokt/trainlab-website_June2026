        {key:"book",       label:"Books & Chapters", match:p => p.type === "book" || p.type === "chapter"},
        {key:"preprint",   label:"Preprints",        match:p => p.type === "preprint"},
        {key:"other",      label:"Patents & Theses", match:p => p.type === "patent" || p.type === "thesis"}
    ];

    let activeFilter = "all";
    let searchQuery = "";

    const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    function primaryUrl(p) {
        if (p.doi)   return "https://doi.org/" + p.doi;
        if (p.url)   return p.url;
        if (p.arxiv) return "https://arxiv.org/abs/" + p.arxiv;
        return "https://scholar.google.com/scholar?q=" + encodeURIComponent(p.t);
    }

    // Returns the list of link "chips" shown under each entry.
    function linkChips(p) {
        const chips = [];
        if (p.doi)   chips.push({href:"https://doi.org/" + p.doi,        icon:"external-link", label:"DOI"});
        if (p.url)   chips.push({href:p.url,                              icon:"file-text",     label:"PDF"});
        if (p.arxiv) chips.push({href:"https://arxiv.org/abs/" + p.arxiv, icon:"file-text",     label:"arXiv"});
        if (!chips.length) chips.push({href:"https://scholar.google.com/scholar?q=" + encodeURIComponent(p.t), icon:"search", label:"Scholar"});
        return chips;
    }

    function authorsHtml(a) {
        return esc(a).replace(/C\. K\. Thomas/g, "<strong>C. K. Thomas</strong>");
    }

    function renderFilters() {
        const wrap = document.getElementById("pub-filters");
        wrap.innerHTML = FILTERS.map(f => {
            const n = PUBS.filter(f.match).length;
            return `<button class="filter-btn${f.key === activeFilter ? " active" : ""}" data-filter="${f.key}">${f.label} <span style="opacity:.6">(${n})</span></button>`;
        }).join("");
        wrap.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                activeFilter = btn.dataset.filter;
                renderFilters();
                renderResults();
            });
        });
    }

    function renderResults() {
        const matcher = FILTERS.find(f => f.key === activeFilter).match;
        const q = searchQuery.trim().toLowerCase();
        const list = PUBS.filter(p => {
            if (!matcher(p)) return false;
            if (!q) return true;
            return (p.t + " " + p.a + " " + p.v).toLowerCase().includes(q);
        });

        document.getElementById("pub-count").textContent =
            list.length + (list.length === 1 ? " publication" : " publications");

        const results = document.getElementById("pub-results");
        if (!list.length) {
            results.innerHTML = `<div class="no-results">No publications match your search.</div>`;
            return;
        }

        const years = [...new Set(list.map(p => p.y))].sort((a, b) => b - a);
        results.innerHTML = years.map(year => {
            const items = list.filter(p => p.y === year).map(p => {
                const tm = TYPE_META[p.type];
                const url = primaryUrl(p);
                const chips = linkChips(p).map(c =>
                    `<a class="pe-link" href="${c.href}" target="_blank" rel="noopener"><i data-lucide="${c.icon}"></i> ${c.label}</a>`
                ).join("");
                return `
                <div class="pub-entry">
                    <div class="pe-title"><a href="${url}" target="_blank" rel="noopener">${esc(p.t)}</a></div>
                    <div class="pe-authors">${authorsHtml(p.a)}</div>
                    <div class="pe-venue">${esc(p.v)}, ${p.y}</div>
                    <div class="pe-meta">
                        <span class="pe-badge ${tm.cls}">${tm.label}</span>
                        ${chips}
                    </div>
                </div>`;
            }).join("");
            return `<div class="year-group"><h2 class="year-heading"><span class="year-num">${year}</span></h2>${items}</div>`;
        }).join("");

        if (window.lucide) lucide.createIcons();
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderFilters();
        renderResults();
        const input = document.getElementById("pub-search-input");
        input.addEventListener("input", e => {
            searchQuery = e.target.value;
            renderResults();
        });
        if (window.lucide) lucide.createIcons();
    });
    </script>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
